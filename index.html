<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>లలితా శ్రీ టైలర్స్</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 10px; margin: 0; }
        .app-container { background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto 20px auto; }
        
        .header { text-align: center; margin-bottom: 15px; }
        .shop-name { color: #d32f2f; font-size: 26px; margin: 10px 0 5px 0; font-weight: bold; }
        .subtitle { color: #555; font-size: 14px; }
        
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #e9ecef; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .nav-bar input { width: 60px; padding: 8px; text-align: center; font-weight: bold; }
        .nav-btn { background: #6c757d; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        
        h3 { background: #d32f2f; color: white; padding: 10px; border-radius: 5px; font-size: 16px; margin-top: 20px; text-align: center; }
        .customer-sec { margin-bottom: 15px; }
        .customer-sec input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; margin-top: 5px; }
        label { font-size: 13px; color: #555; font-weight: bold; }
        
        .measure-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .input-group { display: flex; flex-direction: column; }
        .measure-grid input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 15px; }

        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; color: #fff; }
        .btn-success { background-color: #28a745; }
        .btn-share { background-color: #25D366; } 
        .btn-new { background-color: #17a2b8; margin-top: 10px; width: 100%; }
        
        /* Hidden Receipt Style */
        #receiptWrapper { position: absolute; left: -9999px; top: 0; }
        #receiptCard { width: 350px; padding: 25px; background: #fff; border: 4px solid #d32f2f; border-radius: 10px; text-align: center; font-family: sans-serif; }
        #receiptCard h2 { color: #d32f2f; margin: 0 0 10px 0; font-size: 28px; }
        #receiptCard .details { text-align: left; margin-top: 20px; font-size: 18px; line-height: 1.6; }
        #receiptCard .status { margin-top: 20px; padding: 10px; background: #e8f5e9; color: #2e7d32; font-weight: bold; font-size: 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="shop-name">లలితా శ్రీ టైలర్స్</div>
        <div class="subtitle">(Lalitha Sri Tailors)</div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" onclick="window.goPrevious()">&#8592; Previous</button>
        <div>
            <b>S.No: </b>
            <input type="number" id="searchSno" placeholder="1">
            <button class="nav-btn" onclick="window.searchCustomer()">Go</button>
        </div>
    </div>

    <div class="customer-sec">
        <label>కస్టమర్ పేరు (Name):</label>
        <input type="text" id="custName" placeholder="పేరు నమోదు చేయండి">
        <br><br>
        <label>మొబైల్ నంబర్ (Mobile):</label>
        <input type="tel" id="custMobile" placeholder="ఖచ్చితంగా 10 అంకెలు" maxlength="10" minlength="10" pattern="\d{10}" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
    </div>

    <h3>షర్ట్ కొలతలు (Shirt)</h3>
    <div class="measure-grid">
        <div class="input-group"><label>a. పొడవు</label><input type="text" id="s_a"></div>
        <div class="input-group"><label>b. భుజం</label><input type="text" id="s_b"></div>
        <div class="input-group"><label>c. చేతి పొడవు</label><input type="text" id="s_c"></div>
        <div class="input-group"><label>d. చేతి లూజు</label><input type="text" id="s_d"></div>
        <div class="input-group"><label>e. చంక</label><input type="text" id="s_e"></div>
        <div class="input-group"><label>f. ఛాతీ</label><input type="text" id="s_f"></div>
        <div class="input-group"><label>g. పై భాగం</label><input type="text" id="s_g"></div>
        <div class="input-group"><label>h. మధ్య</label><input type="text" id="s_h"></div>
        <div class="input-group"><label>i. కింది</label><input type="text" id="s_i"></div>
        <div class="input-group"><label>j. కాలర్</label><input type="text" id="s_j"></div>
    </div>

    <h3>ప్యాంట్ కొలతలు (Pant)</h3>
    <div class="measure-grid">
        <div class="input-group"><label>i. పొడవు</label><input type="text" id="p_i"></div>
        <div class="input-group"><label>ii. జాయింట్ పొడవు</label><input type="text" id="p_ii"></div>
        <div class="input-group"><label>iii. నడుము</label><input type="text" id="p_iii"></div>
        <div class="input-group"><label>iv. హిప్</label><input type="text" id="p_iv"></div>
        <div class="input-group"><label>v. తొడ</label><input type="text" id="p_v"></div>
        <div class="input-group"><label>v(a). కిస్తా (Kista)</label><input type="text" id="p_kista"></div>
        <div class="input-group"><label>vi. మోకాలు</label><input type="text" id="p_vi"></div>
        <div class="input-group"><label>vii. జాయింట్ లెక్</label><input type="text" id="p_vii"></div>
        <div class="input-group"><label>viii. పాదం</label><input type="text" id="p_viii"></div>
    </div>

    <div class="action-btns">
        <button id="saveBtn" class="btn-success" onclick="window.saveCustomer()">సేవ్ చేయండి</button>
        <button class="btn-share" onclick="window.shareAsImage()">రసీదు షేర్</button>
    </div>
    
    <button class="btn-new" onclick="window.startNewCustomer()">+ కొత్త కస్టమర్ (New)</button>
</div>

<div id="receiptWrapper">
    <div id="receiptCard">
        <h2>లలితా శ్రీ టైలర్స్</h2>
        <div style="color: #666; font-size: 14px;">కస్టమర్ రసీదు (Receipt)</div>
        <hr style="border: 1px solid #eee; margin: 15px 0;">
        <div class="details">
            <p><b>S.No:</b> <span id="r_sno"></span></p>
            <p><b>పేరు:</b> <span id="r_name"></span></p>
            <p><b>మొబైల్:</b> <span id="r_mobile"></span></p>
        </div>
        <div class="status">స్టేటస్: బుక్ చేయబడింది</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 🔴 1. PASTE YOUR FIREBASE CONFIG HERE 🔴
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdef"
    };

    // 🔴 2. PASTE YOUR GOOGLE SHEETS WEB APP URL HERE 🔴
    const GOOGLE_SHEET_BACKUP_URL = "YOUR_GOOGLE_WEB_APP_URL_HERE";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentSno = 1;
    let maxSno = 1;
    let bookData = JSON.parse(localStorage.getItem("lalithaTailorBook")) || [];
    
    maxSno = bookData.length + 1;
    currentSno = maxSno;
    document.getElementById("searchSno").value = currentSno;

    window.startNewCustomer = function() {
        maxSno = bookData.length + 1;
        currentSno = maxSno;
        document.getElementById("searchSno").value = currentSno;
        document.getElementById("custName").value = "";
        document.getElementById("custMobile").value = "";
        document.querySelectorAll('.measure-grid input').forEach(input => input.value = "");
    };

    window.saveCustomer = async function() {
        let name = document.getElementById("custName").value.trim();
        let mobile = document.getElementById("custMobile").value.trim();
        
        if (name === "") { 
            alert("కస్టమర్ పేరు తప్పనిసరిగా నమోదు చేయాలి!"); 
            return; 
        }
        
        // STRICT 10-DIGIT RULE
        if (mobile.length !== 10) {
            alert("ఎర్రర్: దయచేసి ఖచ్చితంగా 10 అంకెల మొబైల్ నంబర్ నమోదు చేయండి.");
            return;
        }

        let customerData = {
            sno: currentSno, name: name, mobile: mobile,
            shirt: {
                a: document.getElementById("s_a").value, b: document.getElementById("s_b").value,
                c: document.getElementById("s_c").value, d: document.getElementById("s_d").value,
                e: document.getElementById("s_e").value, f: document.getElementById("s_f").value,
                g: document.getElementById("s_g").value, h: document.getElementById("s_h").value,
                i: document.getElementById("s_i").value, j: document.getElementById("s_j").value
            },
            pant: {
                i: document.getElementById("p_i").value, ii: document.getElementById("p_ii").value,
                iii: document.getElementById("p_iii").value, iv: document.getElementById("p_iv").value,
                v: document.getElementById("p_v").value, kista: document.getElementById("p_kista").value,
                vi: document.getElementById("p_vi").value, vii: document.getElementById("p_vii").value, 
                viii: document.getElementById("p_viii").value
            },
            timestamp: new Date().toISOString()
        };

        if (currentSno <= bookData.length) { bookData[currentSno - 1] = customerData; } 
        else { bookData.push(customerData); maxSno = bookData.length + 1; }
        localStorage.setItem("lalithaTailorBook", JSON.stringify(bookData));

        let btn = document.getElementById("saveBtn");
        btn.innerHTML = "సేవ్ అవుతోంది...";

        try {
            await setDoc(doc(db, "customers", currentSno.toString()), customerData);
            
            if (GOOGLE_SHEET_BACKUP_URL !== "YOUR_GOOGLE_WEB_APP_URL_HERE") {
                fetch(GOOGLE_SHEET_BACKUP_URL, {
                    method: "POST",
                    body: JSON.stringify(customerData)
                }).catch(e => console.log("Sheet backup failed, Firebase saved."));
            }

            btn.innerHTML = "సేవ్ చేయబడింది!";
            setTimeout(() => { btn.innerHTML = "సేవ్ చేయండి"; window.startNewCustomer(); }, 1500);
        } catch (e) {
            alert("ఎర్రర్: క్లౌడ్‌లో సేవ్ కాలేదు. కానీ ఫోన్‌లో సేవ్ చేయబడింది.");
            btn.innerHTML = "సేవ్ చేయండి";
        }
    };

    window.loadCustomerData = function(sno) {
        if (sno > 0 && sno <= bookData.length) {
            currentSno = sno;
            document.getElementById("searchSno").value = currentSno;
            let data = bookData[currentSno - 1];
            
            document.getElementById("custName").value = data.name;
            document.getElementById("custMobile").value = data.mobile || "";
            
            document.getElementById("s_a").value = data.shirt.a; document.getElementById("s_b").value = data.shirt.b;
            document.getElementById("s_c").value = data.shirt.c; document.getElementById("s_d").value = data.shirt.d;
            document.getElementById("s_e").value = data.shirt.e; document.getElementById("s_f").value = data.shirt.f;
            document.getElementById("s_g").value = data.shirt.g; document.getElementById("s_h").value = data.shirt.h;
            document.getElementById("s_i").value = data.shirt.i; document.getElementById("s_j").value = data.shirt.j;

            document.getElementById("p_i").value = data.pant.i; document.getElementById("p_ii").value = data.pant.ii;
            document.getElementById("p_iii").value = data.pant.iii; document.getElementById("p_iv").value = data.pant.iv;
            document.getElementById("p_v").value = data.pant.v; document.getElementById("p_kista").value = data.pant.kista || "";
            document.getElementById("p_vi").value = data.pant.vi; document.getElementById("p_vii").value = data.pant.vii; document.getElementById("p_viii").value = data.pant.viii;
        } else { alert("ఈ S.No తో రికార్డు లేదు."); }
    };

    window.goPrevious = function() { if (currentSno > 1) { window.loadCustomerData(currentSno - 1); } };
    window.searchCustomer = function() { let val = parseInt(document.getElementById("searchSno").value); if(!isNaN(val)) { window.loadCustomerData(val); } };

    window.shareAsImage = async function() {
        let name = document.getElementById("custName").value;
        if (name.trim() === "") { alert("దయచేసి కస్టమర్ వివరాలు నమోదు చేయండి."); return; }
        
        document.getElementById("r_sno").innerText = currentSno;
        document.getElementById("r_name").innerText = name;
        document.getElementById("r_mobile").innerText = document.getElementById("custMobile").value || "లేదు";

        try {
            let canvas = await html2canvas(document.getElementById("receiptCard"), { scale: 2 });
            canvas.toBlob(async function(blob) {
                let file = new File([blob], "LalithaSriTailors.png", { type: "image/png" });
                if (navigator.share) { await navigator.share({ title: 'రసీదు', files: [file] }); } 
                else { alert("మీ ఫోన్ ఇమేజ్ షేరింగ్‌కు సపోర్ట్ చేయడం లేదు."); }
            });
        } catch (error) { alert("ఇమేజ్ జనరేట్ చేయడంలో ఎర్రర్."); }
    };
</script>
</body>
      </html>
