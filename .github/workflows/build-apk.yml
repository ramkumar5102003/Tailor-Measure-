name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    name: Compile APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Upgraded to Node 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Prepare Web Folder & Install Plugins
        run: |
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest @capacitor/splash-screen@latest @capacitor/local-notifications@latest
          
          mkdir www
          cp index.html www/
          
          npx cap init "Lalitha Sri Tailors" "com.lalithasri.tailors" --web-dir www
          
          echo '{
            "appId": "com.lalithasri.tailors",
            "appName": "Lalitha Sri Tailors",
            "webDir": "www",
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2500,
                "launchAutoHide": true,
                "backgroundColor": "#ffffff",
                "showSpinner": false
              },
              "LocalNotifications": {
                "smallIcon": "ic_stat_icon_config_sample",
                "iconColor": "#d32f2f"
              }
            }
          }' > capacitor.config.json
          
          npx cap add android

      - name: Generate Custom Frequency Tone (800Hz)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          mkdir -p android/app/src/main/res/raw
          ffmpeg -f lavfi -i "sine=frequency=800:duration=1.5" -c:a pcm_s16le android/app/src/main/res/raw/tone.wav

      - name: Setup Logo
        run: |
          npm install @capacitor/assets --save-dev
          mkdir -p assets
          if [ -f "logo.png" ]; then
            cp logo.png assets/icon.png
            cp logo.png assets/splash.png
            npx @capacitor/assets generate --android
          fi

      - name: Force Clean Sync Android Dependencies
        run: |
          npx cap sync android
          npx cap update android

      - name: Compile the APK File
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: LalithaSriTailors-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
